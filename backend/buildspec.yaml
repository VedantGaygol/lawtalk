version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd backend
      - npm ci

  pre_build:
    commands:
      - echo "Type checking..."
      - npx tsc --noEmit
      - echo "Running tests..."
      - npm test -- --passWithNoTests

  build:
    commands:
      - echo "Compiling TypeScript..."
      - npm run build

  post_build:
    commands:
      - echo "Preparing deployment package..."
      - cp appspec.yml dist/appspec.yml
      - cp -r scripts dist/scripts
      - cp package.json dist/package.json
      - cp package-lock.json dist/package-lock.json

artifacts:
  files:
    - "**/*"
  base-directory: backend/dist