version: 0.2

phases:
install:
runtime-versions:
nodejs: 20
commands:
- echo Installing dependencies
- cd frontend
- npm install

build:
commands:
- echo Building frontend
- cd frontend
- npm run build

post_build:
commands:
- echo Deploying to S3
- aws s3 sync frontend/dist/ s3://lawtalk-frontend/ --delete

artifacts:
files:
- '**/*'
