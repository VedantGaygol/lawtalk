version: 0.2

env:
  variables:
    NODE_VERSION: 20.20.2

phases:
  install:
    commands:
      - echo "Installing Node.js $NODE_VERSION"
      - curl -fsSL "https://unofficial-builds.nodejs.org/download/release/v$NODE_VERSION/node-v$NODE_VERSION-linux-x64-glibc-217.tar.xz" -o /tmp/node.tar.xz
      - mkdir -p .node
      - tar -xJf /tmp/node.tar.xz -C .node --strip-components=1
      - ln -sf "$CODEBUILD_SRC_DIR/.node/bin/node" /usr/local/bin/node
      - ln -sf "$CODEBUILD_SRC_DIR/.node/bin/npm" /usr/local/bin/npm
      - ln -sf "$CODEBUILD_SRC_DIR/.node/bin/npx" /usr/local/bin/npx
      - export PATH="$CODEBUILD_SRC_DIR/.node/bin:$PATH"
      - node -v
      - npm -v
      - echo "Installing backend dependencies"
      - cd backend && npm ci && cd ..
      - echo "Installing frontend dependencies"
      - cd frontend && npm ci && cd ..

  build:
    commands:
      - echo "Building backend"
      - cd backend && npm run build && cd ..
      - echo "Building frontend"
      - cd frontend && npm run build && cd ..
      - chmod +x scripts/*.sh

  post_build:
    commands:
      - echo "Build completed successfully"

artifacts:
  files:
    - backend/dist/**/*
    - backend/package.json
    - backend/package-lock.json
    - frontend/dist/**/*
    - appspec.yml
    - scripts/**/*
  discard-paths: no
