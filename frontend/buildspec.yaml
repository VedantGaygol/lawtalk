version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - cd frontend
      - npm ci

  pre_build:
    commands:
      - echo "Type checking..."
      - npx tsc --noEmit
      - echo "Linting..."
      - npx eslint src --max-warnings 0

  build:
    commands:
      - echo "Building React app..."
      - echo "VITE_API_URL=http://lawtalk-alb-123456789.ap-south-1.elb.amazonaws.com" > .env.production
      - echo "VITE_SOCKET_URL=http://lawtalk-alb-123456789.ap-south-1.elb.amazonaws.com" >> .env.production
      - npm run build

  post_build:
    commands:
      - echo "Deploying to S3..."
      - aws s3 sync dist/ s3://lawtalk-frontend/ --delete \
          --cache-control "public,max-age=31536000,immutable"
      - aws s3 cp dist/index.html s3://lawtalk-frontend/index.html \
          --cache-control "no-cache,no-store,must-revalidate"
      - echo "Invalidating CloudFront cache..."
      - aws cloudfront create-invalidation \
          --distribution-id EUSVV7H383OFD \
          --paths "/*"

artifacts:
  files:
    - "**/*"
  base-directory: frontend/dist
