version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing dependencies..."
      - npm ci

  build:
    commands:
      - echo "Building React app..."

      - echo "VITE_API_URL=http://98.89.244.150" > .env.production
      - echo "VITE_SOCKET_URL=http://98.89.244.150" >> .env.production

      - export NODE_OPTIONS=--max_old_space_size=4096

      - npm run build

  post_build:
    commands:
      - echo "Checking dist folder..."
      - ls -la dist

      - echo "Deploying to S3..."
      - aws s3 sync dist/ s3://lawtalk-frontend/ --delete --cache-control "public,max-age=31536000,immutable"

      - aws s3 cp dist/index.html s3://lawtalk-frontend/index.html --cache-control "no-cache,no-store,must-revalidate"

      - aws cloudfront create-invalidation --distribution-id $CF_DISTRIBUTION_ID --paths "/*"

artifacts:
  base-directory: dist
  files:
    - '**/*'
