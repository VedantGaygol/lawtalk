version: 0.2
# Backend-only buildspec for CodePipeline.
# Frontend is built and deployed automatically by AWS Amplify Hosting.
# Drop this as buildspec.yml in the repo root.

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - node -v && npm -v
      - cd backend && npm ci && cd ..

  pre_build:
    commands:
      - chmod +x scripts/*.sh

  build:
    commands:
      - cd backend && npm run build && cd ..

  post_build:
    commands:
      - echo "Backend build complete"

artifacts:
  # Only backend artifacts go to CodeDeploy
  files:
    - backend/dist/**/*
    - backend/package.json
    - backend/package-lock.json
    - appspec.yml
    - scripts/**/*
  discard-paths: no
