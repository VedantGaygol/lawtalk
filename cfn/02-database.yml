AWSTemplateFormatVersion: "2010-09-09"
Description: >
  LawTalk – Database Stack
  RDS PostgreSQL 15, Secrets Manager credential, subnet group, security group.

Parameters:
  EnvironmentName:
    Type: String
    Default: lawtalk
  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    # Assumption: t3.micro for cost; change to db.t3.small+ for production load
  MultiAZ:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Set true for production Multi-AZ
  DBName:
    Type: String
    Default: lawtalk

Resources:

  # ── Security Group ────────────────────────────────────────────────────────
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow EC2 backend to reach RDS on 5432
      VpcId: !ImportValue
        Fn::Sub: "${EnvironmentName}-VpcId"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !ImportValue
            Fn::Sub: "${EnvironmentName}-BackendSG"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-rds-sg"

  # ── Subnet Group ─────────────────────────────────────────────────────────
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Private subnets for LawTalk RDS
      SubnetIds:
        - !ImportValue
          Fn::Sub: "${EnvironmentName}-PrivateSubnet1"
        - !ImportValue
          Fn::Sub: "${EnvironmentName}-PrivateSubnet2"
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-db-subnet-group"

  # ── Secrets Manager – DB credentials ─────────────────────────────────────
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/rds/credentials"
      Description: RDS master credentials for LawTalk
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"username": "lawtalk_admin"}'
        GenerateStringKey: "password"
        PasswordLength: 32
        ExcludeCharacters: '"@/\\'

  # ── RDS Instance ──────────────────────────────────────────────────────────
  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentName}-postgres"
      DBName: !Ref DBName
      Engine: postgres
      EngineVersion: "15.7"
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: "20"
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: !Ref MultiAZ
      MasterUsername: !Sub "{{resolve:secretsmanager:${DBSecret}:SecretString:username}}"
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DBSecret}:SecretString:password}}"
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref RDSSecurityGroup
      BackupRetentionPeriod: 7
      DeletionProtection: false   # set true in production
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-rds"

  # ── Attach DB endpoint to secret so app can resolve full URL ─────────────
  DBSecretAttachment:
    Type: AWS::SecretsManager::SecretTargetAttachment
    Properties:
      SecretId: !Ref DBSecret
      TargetId: !Ref DBInstance
      TargetType: AWS::RDS::DBInstance

Outputs:
  DBEndpoint:
    Value: !GetAtt DBInstance.Endpoint.Address
    Export:
      Name: !Sub "${EnvironmentName}-DBEndpoint"
  DBPort:
    Value: !GetAtt DBInstance.Endpoint.Port
    Export:
      Name: !Sub "${EnvironmentName}-DBPort"
  DBSecretArn:
    Value: !Ref DBSecret
    Export:
      Name: !Sub "${EnvironmentName}-DBSecretArn"
  DBName:
    Value: !Ref DBName
    Export:
      Name: !Sub "${EnvironmentName}-DBName"
